<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Papa Vito 進貨快速輸入</title>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --accent: #e8502a;
    --accent2: #ff6b47;
    --text: #f0ede8;
    --text2: #9a9590;
    --text3: #5a5550;
    --green: #4caf72;
    --yellow: #f5a623;
    --radius: 12px;
    --font: 'PingFang TC', 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; overflow-x: hidden; }

  /* HEADER */
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 16px; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; gap: 12px; }
  .logo { width: 36px; height: 36px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .header-title { flex: 1; }
  .header-title h1 { font-size: 16px; font-weight: 700; letter-spacing: 0.5px; }
  .header-title p { font-size: 11px; color: var(--text2); margin-top: 1px; }
  .record-count { background: var(--accent); color: white; border-radius: 20px; padding: 3px 10px; font-size: 12px; font-weight: 700; flex-shrink: 0; }

  /* TABS */
  .tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); }
  .tab { flex: 1; padding: 12px 8px; text-align: center; font-size: 13px; font-weight: 600; color: var(--text2); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* PANEL */
  .panel { display: none; padding: 16px; }
  .panel.active { display: block; }

  /* FORM CARD */
  .form-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 14px; }
  .form-card h3 { font-size: 12px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px; }

  /* INPUTS */
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 5px; font-weight: 600; }
  .field input, .field select { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 11px 12px; color: var(--text); font-size: 15px; font-family: var(--font); appearance: none; outline: none; transition: border-color 0.2s; }
  .field input:focus, .field select:focus { border-color: var(--accent); }
  .field input::placeholder { color: var(--text3); }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .field-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

  /* SEARCH */
  .search-wrap { position: relative; }
  .search-wrap input { padding-left: 36px; }
  .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 16px; pointer-events: none; }
  .search-results { position: absolute; left: 0; right: 0; background: var(--surface2); border: 1px solid var(--accent); border-top: none; border-radius: 0 0 10px 10px; z-index: 200; max-height: 220px; overflow-y: auto; box-shadow: 0 8px 24px rgba(0,0,0,0.6); }
  .search-result-item { padding: 11px 14px; cursor: pointer; border-bottom: 1px solid var(--border); transition: background 0.15s; }
  .search-result-item:last-child { border-bottom: none; }
  .search-result-item:active, .search-result-item:hover { background: var(--border); }
  .sri-name { font-size: 14px; font-weight: 600; }
  .sri-meta { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .sri-code { color: var(--accent); font-weight: 700; }

  /* SELECTED ITEM BADGE */
  .selected-badge { background: var(--surface2); border: 1px solid var(--green); border-radius: 8px; padding: 10px 12px; margin-top: 8px; display: none; }
  .selected-badge.visible { display: flex; align-items: center; gap: 10px; }
  .sb-code { background: var(--green); color: white; border-radius: 5px; padding: 2px 8px; font-size: 11px; font-weight: 800; flex-shrink: 0; }
  .sb-info { flex: 1; }
  .sb-name { font-size: 14px; font-weight: 700; }
  .sb-spec { font-size: 11px; color: var(--text2); margin-top: 1px; }
  .sb-clear { color: var(--text3); font-size: 18px; cursor: pointer; padding: 4px; }

  /* BUTTONS */
  .btn-primary { width: 100%; background: var(--accent); color: white; border: none; border-radius: 10px; padding: 14px; font-size: 16px; font-weight: 700; font-family: var(--font); cursor: pointer; transition: background 0.2s; letter-spacing: 0.5px; }
  .btn-primary:active { background: var(--accent2); }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); border-radius: 10px; padding: 11px; font-size: 14px; font-weight: 600; font-family: var(--font); cursor: pointer; transition: all 0.2s; }
  .btn-secondary:active { background: var(--border); }
  .btn-danger { background: #2a1515; color: #e05050; border: 1px solid #4a2020; border-radius: 8px; padding: 6px 12px; font-size: 12px; font-family: var(--font); cursor: pointer; }
  .btn-export { width: 100%; background: var(--green); color: white; border: none; border-radius: 10px; padding: 14px; font-size: 16px; font-weight: 700; font-family: var(--font); cursor: pointer; margin-bottom: 10px; }

  /* STORE TOGGLE */
  .store-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .store-btn { background: var(--surface2); border: 2px solid var(--border); border-radius: 8px; padding: 10px; text-align: center; cursor: pointer; transition: all 0.2s; font-weight: 700; font-size: 14px; }
  .store-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(232,80,42,0.08); }

  /* TAX TOGGLE */
  .tax-toggle { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
  .tax-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; padding: 8px 4px; text-align: center; cursor: pointer; font-size: 12px; font-weight: 700; color: var(--text2); transition: all 0.2s; }
  .tax-btn.active { border-color: var(--yellow); color: var(--yellow); background: rgba(245,166,35,0.08); }

  /* DATE QUICK */
  .date-quick { display: flex; gap: 6px; margin-top: 6px; }
  .dq-btn { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 7px 4px; text-align: center; font-size: 11px; font-weight: 600; color: var(--text2); cursor: pointer; }
  .dq-btn:active { background: var(--border); }

  /* RECORDS LIST */
  .records-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .records-count { font-size: 13px; color: var(--text2); }
  .record-item { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; }
  .ri-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .ri-name { font-size: 14px; font-weight: 700; flex: 1; }
  .ri-amount { font-size: 15px; font-weight: 800; color: var(--yellow); flex-shrink: 0; }
  .ri-meta { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 7px; }
  .ri-tag { background: var(--surface2); border-radius: 4px; padding: 2px 7px; font-size: 11px; color: var(--text2); }
  .ri-tag.store1 { color: #5ba5e8; }
  .ri-tag.store2 { color: #c97be8; }
  .empty-state { text-align: center; padding: 48px 24px; color: var(--text3); }
  .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; line-height: 1.6; }

  /* TOAST */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--green); color: white; padding: 10px 20px; border-radius: 20px; font-size: 14px; font-weight: 700; opacity: 0; transition: all 0.3s; z-index: 1000; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* MISC INPUT */
  .misc-section { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 12px; }
  .misc-section p { font-size: 12px; color: var(--text2); margin-bottom: 8px; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit:scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">🍕</div>
  <div class="header-title">
    <h1>Papa Vito 進貨工具</h1>
    <p>快速輸入，月底匯出CSV</p>
  </div>
  <div class="record-count" id="headerCount">0 筆</div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('input')">📝 輸入進貨</div>
  <div class="tab" onclick="switchTab('records')">📋 今日記錄</div>
  <div class="tab" onclick="switchTab('export')">📤 匯出</div>
</div>

<!-- INPUT PANEL -->
<div class="panel active" id="panel-input">

  <!-- Store selector -->
  <div class="form-card">
    <h3>店別</h3>
    <div class="store-toggle">
      <div class="store-btn active" id="storeBtn1" onclick="setStore(1)">🏠 天母店（1店）</div>
      <div class="store-btn" id="storeBtn2" onclick="setStore(2)">🏪 昌吉店（2店）</div>
    </div>
  </div>

  <!-- Item search -->
  <div class="form-card">
    <h3>品項搜尋</h3>
    <div class="field">
      <label>搜尋品項名稱或識別碼</label>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="輸入品項名稱或代號（如 B001、起司）" autocomplete="off" oninput="onSearch()">
        <div class="search-results" id="searchResults" style="display:none;"></div>
      </div>
    </div>
    <div class="selected-badge" id="selectedBadge">
      <span class="sb-code" id="sbCode"></span>
      <div class="sb-info">
        <div class="sb-name" id="sbName"></div>
        <div class="sb-spec" id="sbSpec"></div>
      </div>
      <span class="sb-clear" onclick="clearSelected()">✕</span>
    </div>

    <!-- Misc item toggle -->
    <div style="margin-top:10px;">
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2);cursor:pointer;">
        <input type="checkbox" id="miscCheck" onchange="toggleMisc()" style="width:16px;height:16px;accent-color:var(--accent);">
        無識別碼的雜支（水電、薪資等）
      </label>
    </div>
    <div class="misc-section" id="miscSection" style="display:none;margin-top:10px;">
      <p>輸入類別及品項描述</p>
      <div class="field-row">
        <div class="field" style="margin-bottom:0">
          <label>費用類別</label>
          <select id="miscCat">
            <option value="2.8、水費">水費</option>
            <option value="2.9、電費">電費</option>
            <option value="2.10、瓦斯費">瓦斯費</option>
            <option value="1.1.2、兼職薪資">兼職薪資</option>
            <option value="1、食材成本">食材成本</option>
            <option value="2.3、物料消耗">物料消耗</option>
            <option value="2.5、廣告費用">廣告費用</option>
            <option value="2.6、運雜費">運雜費</option>
            <option value="2.11、修繕費">修繕費</option>
            <option value="2.13、文具費">文具費</option>
            <option value="2.16、其他費用">其他費用</option>
            <option value="2.17、外送費">外送費</option>
            <option value="3.4、店面租賃費">租賃費</option>
            <option value="3.6、諮詢服務費">諮詢服務費</option>
            <option value="4.3、手續費">手續費</option>
          </select>
        </div>
        <div class="field" style="margin-bottom:0">
          <label>品項描述</label>
          <input type="text" id="miscName" placeholder="如：台北水費11501">
        </div>
      </div>
    </div>
  </div>

  <!-- Entry details -->
  <div class="form-card">
    <h3>進貨資料</h3>

    <div class="field">
      <label>日期</label>
      <input type="date" id="entryDate">
      <div class="date-quick">
        <div class="dq-btn" onclick="setDateToday()">今天</div>
        <div class="dq-btn" onclick="setDateYesterday()">昨天</div>
        <div class="dq-btn" onclick="setDate2DaysAgo()">前天</div>
      </div>
    </div>

    <div class="field-row">
      <div class="field">
        <label>數量</label>
        <input type="number" id="qty" placeholder="0" step="0.1" min="0" inputmode="decimal">
      </div>
      <div class="field">
        <label>未稅單價（元）</label>
        <input type="number" id="price" placeholder="0" step="0.01" min="0" inputmode="decimal">
      </div>
    </div>

    <div class="field">
      <label>稅別</label>
      <div class="tax-toggle">
        <div class="tax-btn active" id="taxBtn0" onclick="setTax(0)">免稅（0）</div>
        <div class="tax-btn" id="taxBtn005" onclick="setTax(0.05)">應稅 5%</div>
        <div class="tax-btn" id="taxBtn5" onclick="setTax(5)">其他</div>
      </div>
    </div>

    <div class="field-row">
      <div class="field">
        <label>廠商／備註</label>
        <input type="text" id="vendor" placeholder="廠商名稱">
      </div>
      <div class="field">
        <label>發票／流水號</label>
        <input type="text" id="invoice" placeholder="發票號碼" style="text-transform:uppercase;">
      </div>
    </div>

    <!-- Preview total -->
    <div style="background:var(--surface2);border-radius:8px;padding:10px 12px;margin-top:4px;display:flex;justify-content:space-between;align-items:center;">
      <span style="font-size:12px;color:var(--text2);">含稅金額預覽</span>
      <span style="font-size:18px;font-weight:800;color:var(--yellow);" id="totalPreview">—</span>
    </div>
  </div>

  <button class="btn-primary" onclick="saveEntry()">✅ 儲存這筆進貨</button>
</div>

<!-- RECORDS PANEL -->
<div class="panel" id="panel-records">
  <div class="records-header">
    <span class="records-count" id="recordsCount">共 0 筆</span>
    <button class="btn-danger" onclick="clearAllRecords()">清空全部</button>
  </div>
  <div id="recordsList"></div>
</div>

<!-- EXPORT PANEL -->
<div class="panel" id="panel-export">
  <div class="form-card">
    <h3>匯出設定</h3>
    <div class="field">
      <label>匯出格式</label>
      <select id="exportFormat">
        <option value="csv">CSV（可直接貼入Excel）</option>
      </select>
    </div>
    <p style="font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:14px;">
      匯出後，開啟Excel → 選擇您的進貨表工作表 → 在最後一行空白處貼上資料即可。欄位順序與您原本的進貨表完全一致。
    </p>
    <button class="btn-export" onclick="exportCSV()">📥 下載 CSV 檔</button>
    <button class="btn-secondary" style="width:100%;" onclick="copyCSV()">📋 複製到剪貼板</button>
  </div>

  <div class="form-card">
    <h3>資料統計</h3>
    <div id="statsContent" style="font-size:13px;color:var(--text2);line-height:2;"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

// ============ TABS ============
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['input','records','export'][i] === tab);
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  if (tab === 'records') renderRecords();
  if (tab === 'export') updateStats();
}

// ============ STORE ============
function setStore(n) {
  currentStore = n;
  document.getElementById('storeBtn1').classList.toggle('active', n === 1);
  document.getElementById('storeBtn2').classList.toggle('active', n === 2);
}

// ============ TAX ============
function setTax(v) {
  currentTax = v;
  document.getElementById('taxBtn0').classList.toggle('active', v === 0);
  document.getElementById('taxBtn005').classList.toggle('active', v === 0.05);
  document.getElementById('taxBtn5').classList.toggle('active', v === 5);
  updatePreview();
}

// ============ DATE ============
function setDateToday() { document.getElementById('entryDate').value = fmtDate(new Date()); }
function setDateYesterday() { const d = new Date(); d.setDate(d.getDate()-1); document.getElementById('entryDate').value = fmtDate(d); }
function setDate2DaysAgo() { const d = new Date(); d.setDate(d.getDate()-2); document.getElementById('entryDate').value = fmtDate(d); }
function fmtDate(d) { return d.toISOString().split('T')[0]; }

// ============ SEARCH ============
function onSearch() {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(doSearch, 150);
}

function doSearch() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const resultsEl = document.getElementById('searchResults');
  if (!q || q.length < 1) { resultsEl.style.display = 'none'; return; }
  const matches = ITEMS.filter(i =>
    i.name.toLowerCase().includes(q) ||
    i.code.toLowerCase().includes(q) ||
    i.cat.toLowerCase().includes(q)
  ).slice(0, 12);
  if (!matches.length) { resultsEl.style.display = 'none'; return; }
  resultsEl.innerHTML = matches.map(i => `
    <div class="search-result-item" onclick="selectItem('${i.code}')">
      <div class="sri-name">${i.name}</div>
      <div class="sri-meta"><span class="sri-code">${i.code}</span> · ${i.cat} · ${i.spec || '—'} · 單位: ${i.unit || '—'}</div>
    </div>
  `).join('');
  resultsEl.style.display = 'block';
}

function selectItem(code) {
  selectedItem = ITEMS.find(i => i.code === code);
  if (!selectedItem) return;
  document.getElementById('searchInput').value = selectedItem.name;
  document.getElementById('searchResults').style.display = 'none';
  document.getElementById('sbCode').textContent = selectedItem.code;
  document.getElementById('sbName').textContent = selectedItem.name;
  document.getElementById('sbSpec').textContent = (selectedItem.spec || '—') + '  ·  單位: ' + (selectedItem.unit || '—');
  document.getElementById('selectedBadge').classList.add('visible');
  document.getElementById('miscCheck').checked = false;
  document.getElementById('miscSection').style.display = 'none';
}

function clearSelected() {
  selectedItem = null;
  document.getElementById('searchInput').value = '';
  document.getElementById('selectedBadge').classList.remove('visible');
}

// ============ MISC ============
function toggleMisc() {
  const on = document.getElementById('miscCheck').checked;
  document.getElementById('miscSection').style.display = on ? 'block' : 'none';
  if (on) { clearSelected(); document.getElementById('searchInput').value = ''; }
}

// ============ PREVIEW ============
function updatePreview() {
  const qty = parseFloat(document.getElementById('qty').value) || 0;
  const price = parseFloat(document.getElementById('price').value) || 0;
  const subtotal = Math.round(qty * price);
  const taxRate = currentTax === 5 ? 0 : currentTax;
  const total = Math.round(subtotal * (1 + taxRate));
  document.getElementById('totalPreview').textContent = total > 0 ? '$' + total.toLocaleString() : '—';
}

// ============ SAVE ============
function saveEntry() {
  const isMisc = document.getElementById('miscCheck').checked;
  const date = document.getElementById('entryDate').value;
  const qty = parseFloat(document.getElementById('qty').value);
  const price = parseFloat(document.getElementById('price').value);
  const vendor = document.getElementById('vendor').value.trim();
  const invoice = document.getElementById('invoice').value.trim().toUpperCase();

  if (!date) { showToast('❌ 請選擇日期', true); return; }
  if (isNaN(qty) || qty <= 0) { showToast('❌ 請輸入數量', true); return; }
  if (isNaN(price) || price < 0) { showToast('❌ 請輸入單價', true); return; }

  let code = '', name = '', spec = '', unit = '', cat = '';

  if (isMisc) {
    const miscName = document.getElementById('miscName').value.trim();
    cat = document.getElementById('miscCat').value;
    name = miscName || cat;
    if (!name) { showToast('❌ 請輸入品項描述', true); return; }
  } else {
    if (!selectedItem) { showToast('❌ 請搜尋並選擇品項', true); return; }
    code = selectedItem.code;
    name = selectedItem.name;
    spec = selectedItem.spec;
    unit = selectedItem.unit;
    cat = '1、食材成本';
    if (['包材','耗材'].includes(selectedItem.cat)) cat = '2.3、物料消耗';
    if (selectedItem.cat === '飲料') cat = '1、食材成本';
  }

  const subtotal = Math.round(qty * price);
  const taxRate = currentTax === 5 ? 0 : currentTax;
  const total = Math.round(subtotal * (1 + taxRate));
  const taxVal = currentTax === 5 ? 5 : currentTax;

  const record = {
    id: Date.now(),
    date, cat, code, name, spec, unit,
    qty, price: Math.round(price * 100) / 100,
    subtotal, total, tax: taxVal,
    vendor, invoice,
    store: currentStore
  };

  records.unshift(record);
  saveRecords();
  updateHeaderCount();
  showToast('✅ 已儲存：' + name);

  // Reset form (keep store, date, tax)
  document.getElementById('qty').value = '';
  document.getElementById('price').value = '';
  document.getElementById('vendor').value = '';
  document.getElementById('invoice').value = '';
  document.getElementById('totalPreview').textContent = '—';
  clearSelected();
  document.getElementById('miscCheck').checked = false;
  document.getElementById('miscSection').style.display = 'none';
}

// ============ RECORDS ============
function renderRecords() {
  const list = document.getElementById('recordsList');
  document.getElementById('recordsCount').textContent = '共 ' + records.length + ' 筆';
  if (!records.length) {
    list.innerHTML = `<div class="empty-state"><div class="emoji">📋</div><p>還沒有記錄<br>去輸入頁面新增進貨吧！</p></div>`;
    return;
  }
  list.innerHTML = records.map(r => `
    <div class="record-item">
      <div class="ri-top">
        <div class="ri-name">${r.name}</div>
        <div class="ri-amount">$${r.total.toLocaleString()}</div>
      </div>
      <div class="ri-meta">
        <span class="ri-tag">${r.date}</span>
        <span class="ri-tag ${r.store === 1 ? 'store1' : 'store2'}">${r.store === 1 ? '天母' : '昌吉'}</span>
        ${r.code ? `<span class="ri-tag">${r.code}</span>` : ''}
        <span class="ri-tag">${r.qty} ${r.unit || ''} × $${r.price}</span>
        ${r.invoice ? `<span class="ri-tag">${r.invoice}</span>` : ''}
        <span class="ri-tag" onclick="deleteRecord(${r.id})" style="cursor:pointer;color:#e05050;">🗑 刪除</span>
      </div>
    </div>
  `).join('');
}

function deleteRecord(id) {
  records = records.filter(r => r.id !== id);
  saveRecords();
  updateHeaderCount();
  renderRecords();
  showToast('已刪除');
}

function clearAllRecords() {
  if (!confirm('確定要清空所有記錄嗎？這個動作無法還原。')) return;
  records = [];
  saveRecords();
  updateHeaderCount();
  renderRecords();
  showToast('已清空');
}

  const header = '日期/時間,類別,識別碼,品項,規格,單位,數量,單價（未稅）,價格（未稅）,價格（含稅）,備註,發票號碼/流水號,稅別,店';
  const rows = [...records].reverse().map(r => {
    const dateStr = r.date + ' 0:00';
    const taxStr = r.tax === 0 ? '0' : (r.tax === 0.05 ? '0.05' : '0.05');
    return [
      dateStr, r.cat, r.code || '', r.name, r.spec || '', r.unit || '',
      r.qty, r.price, r.subtotal, r.total,
      r.vendor || '', r.invoice || '', taxStr, r.store
    ].map(v => '"' + String(v).replace(/"/g, '""') + '"').join(',');
  });
  return header + '\n' + rows.join('\n');
}

function exportCSV() {
  if (!records.length) { showToast('❌ 沒有記錄可匯出', true); return; }
  const csv = '\uFEFF' + buildCSV(); // BOM for Excel
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const month = records[0].date.slice(0, 7).replace('-', '');
  a.href = url;
  a.download = 'PapaVito_進貨_' + month + '.csv';
  a.click();
  URL.revokeObjectURL(url);
  showToast('✅ CSV 下載完成！');
}

function copyCSV() {
  if (!records.length) { showToast('❌ 沒有記錄可匯出', true); return; }
  navigator.clipboard.writeText(buildCSV()).then(() => showToast('✅ 已複製到剪貼板！'));
}

function updateStats() {
  const el = document.getElementById('statsContent');
  if (!records.length) { el.textContent = '尚無資料'; return; }
  const total = records.reduce((s, r) => s + r.total, 0);
  const s1 = records.filter(r => r.store === 1).reduce((s, r) => s + r.total, 0);
  const s2 = records.filter(r => r.store === 2).reduce((s, r) => s + r.total, 0);
  const dates = [...new Set(records.map(r => r.date))].sort();
  el.innerHTML = `
    記錄筆數：<strong style="color:var(--text)">${records.length} 筆</strong><br>
    合計金額：<strong style="color:var(--yellow)">$${total.toLocaleString()}</strong><br>
    天母店（1店）：<strong style="color:#5ba5e8">$${s1.toLocaleString()}</strong><br>
    昌吉店（2店）：<strong style="color:#c97be8">$${s2.toLocaleString()}</strong><br>
    日期範圍：<strong style="color:var(--text)">${dates[0] || '—'} ~ ${dates[dates.length-1] || '—'}</strong>
  `;
}

// ============ UTILS ============
function saveRecords() { localStorage.setItem('pv_records', JSON.stringify(records)); }
function updateHeaderCount() { document.getElementById('headerCount').textContent = records.length + ' 筆'; }

let toastTimer;
function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = isError ? '#c0392b' : 'var(--green)';
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// Close search results on outside click
document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap')) {
    document.getElementById('searchResults').style.display = 'none';
  }
});
</script>
